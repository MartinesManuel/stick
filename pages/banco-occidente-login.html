<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Occidente - Portal Transaccional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f5f5f5;
        }

        /* ========== CARRUSEL IZQUIERDO ========== */
        .carousel-section {
            width: 60%;
            position: relative;
            overflow: hidden;
            background: #0a1628;
        }

        .carousel-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Logo en carrusel */
        .carousel-logo {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 10;
        }

        .carousel-logo-placeholder {
            width: 80px;
            height: 80px;
            border: 2px dashed #00a0e4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00a0e4;
            font-size: 10px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Texto VIGILADO */
        .vigilado-text {
            position: absolute;
            bottom: 40px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            letter-spacing: 2px;
        }

        /* Indicadores del carrusel */
        .carousel-indicators {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s;
        }

        .indicator.active {
            background: #00a0e4;
            transform: scale(1.2);
        }

        /* ========== PANEL DERECHO ========== */
        .login-section {
            width: 40%;
            min-width: 450px;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Boton Seguridad */
        .security-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            background: #fff;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .security-btn:hover {
            border-color: #00a0e4;
            color: #00a0e4;
        }

        .security-btn svg {
            width: 20px;
            height: 20px;
            fill: #00a0e4;
        }

        /* Contenido principal */
        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 50px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        /* Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-placeholder {
            width: 220px;
            height: 50px;
            margin: 0 auto;
            border: 2px dashed #00a0e4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00a0e4;
            font-size: 12px;
        }

        /* Bienvenida */
        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text p {
            color: #666;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .welcome-text h1 {
            color: #00a0e4;
            font-size: 24px;
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-size: 16px;
            font-weight: 500;
            background: none;
            border: none;
            position: relative;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #666;
        }

        .tab.active {
            color: #333;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #00a0e4;
        }

        /* Contenido de tabs */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Formularios */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .select-wrapper {
            position: relative;
            width: 100px;
        }

        .form-select {
            width: 100%;
            padding: 14px 35px 14px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            background: #fff;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .form-select:focus {
            outline: none;
            border-color: #00a0e4;
        }

        .select-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #666;
        }

        .form-input {
            flex: 1;
            padding: 14px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #00a0e4;
        }

        .form-input::placeholder {
            color: #aaa;
        }

        /* Input con icono */
        .input-icon-wrapper {
            position: relative;
            flex: 1;
        }

        .input-icon-wrapper .form-input {
            width: 100%;
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            padding: 5px;
        }

        .toggle-password:hover {
            color: #00a0e4;
        }

        .toggle-password svg {
            width: 22px;
            height: 22px;
        }

        /* Link olvidaste */
        .forgot-link {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-link a {
            color: #00a0e4;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        /* Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #00a0e4;
            cursor: pointer;
        }

        .checkbox-wrapper label {
            color: #333;
            font-size: 14px;
            cursor: pointer;
        }

        /* Info box */
        .info-box {
            background: #f5f8fa;
            border: 1px solid #e0e8f0;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-box p {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .info-box a {
            color: #333;
            font-weight: 600;
            text-decoration: none;
        }

        .info-box a:hover {
            color: #00a0e4;
        }

        /* reCAPTCHA */
        .recaptcha-box {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #fafafa;
        }

        .recaptcha-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .recaptcha-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid #c1c1c1;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .recaptcha-checkbox:hover {
            border-color: #00a0e4;
        }

        .recaptcha-checkbox.checked {
            background: #00a0e4;
            border-color: #00a0e4;
        }

        .recaptcha-checkbox svg {
            width: 18px;
            height: 18px;
            fill: #fff;
            display: none;
        }

        .recaptcha-checkbox.checked svg {
            display: block;
        }

        .recaptcha-text {
            color: #333;
            font-size: 14px;
        }

        .recaptcha-logo {
            text-align: center;
        }

        .recaptcha-logo svg {
            width: 40px;
            height: 40px;
        }

        .recaptcha-logo span {
            display: block;
            font-size: 10px;
            color: #999;
        }

        /* Botones */
        .buttons-row {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-outline {
            background: #fff;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .btn-outline:hover {
            border-color: #00a0e4;
            color: #00a0e4;
        }

        .btn-primary {
            background: #00a0e4;
            border: none;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0088c6;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .carousel-section {
                width: 50%;
            }

            .login-section {
                width: 50%;
                min-width: 400px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .carousel-section {
                display: none;
            }

            .login-section {
                width: 100%;
                min-width: auto;
            }

            .login-content {
                padding: 40px 30px;
            }
        }
    </style>
</head>

    <script>
        // ========== CARRUSEL ==========
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        const indicators = document.querySelectorAll('.indicator');
        const totalSlides = slides.length;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                indicators[i].classList.remove('active');
            });
            slides[index].classList.add('active');
            indicators[index].classList.add('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            showSlide(currentSlide);
        }

        // Auto avanzar cada 5 segundos
        setInterval(nextSlide, 5000);

        // Click en indicadores
        indicators.forEach((indicator, index) => {
            indicator.addEventListener('click', () => {
                currentSlide = index;
                showSlide(currentSlide);
            });
        });

        // ========== TABS ==========
        const tabs = document.querySelectorAll('.tab');
        const tabContents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.dataset.tab;

                tabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(tc => tc.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // ========== TOGGLE PASSWORD ==========
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');

            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
